<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0; padding:0; background-color:#f5f5f5; font-family:'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;">
  <div style="max-width:600px; margin:40px auto; background:#ffffff; border-radius:12px; overflow:hidden; border:1px solid #e5e5e5;">

    <!-- 헤더: 텍스트 로고 -->
    <div style="padding:24px 32px; border-bottom:1px solid #eee;">
      <span style="font-size:20px; font-weight:700; color:#0046FF;">SOL-Lite</span>
    </div>

    <!-- 메인 배너 -->
    <div style="background:#0046FF; padding:48px 32px; text-align:center;">
      <p style="color:rgba(255,255,255,0.8); font-size:14px; margin:0 0 12px; letter-spacing:1px;">비밀번호 재설정</p>
      <h1 style="color:#ffffff; margin:0; font-size:24px; font-weight:700; line-height:1.5;">
        비밀번호 재설정을 요청하셨습니다.<br/>
        아래 버튼을 눌러 새 비밀번호를 설정해주세요.
      </h1>
    </div>

    <!-- 본문 -->
    <div style="padding:40px 32px; text-align:center;">
      <p style="color:#555; font-size:15px; line-height:1.7; margin:0 0 32px;">
        본인이 요청하지 않은 경우<br/>
        이 메일을 무시해주세요.
      </p>

      <a th:href="${resetUrl}"
         style="display:inline-block; background:#0046FF; color:#ffffff; text-decoration:none; padding:16px 48px; border-radius:8px; font-size:16px; font-weight:600;">
        비밀번호 재설정하기
      </a>
    </div>

    <!-- 푸터 -->
    <div style="padding:20px 32px; border-top:1px solid #eee; text-align:center;">
      <p style="color:#bbb; font-size:11px; line-height:1.6; margin:0;">
        이 링크는 30분간 유효합니다. 본인이 요청하지 않은 경우 이 메일을 무시해주세요.<br/>
        &copy; 2026 SOL-Lite. All rights reserved.
      </p>
    </div>

  </div>
</body>
</html>
