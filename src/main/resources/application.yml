spring:
  application:
    name: sol-lite-backend

  # ── Oracle (JPA) ──
  datasource:
    url: jdbc:oracle:thin:@tcps://adb.ap-chuncheon-1.oraclecloud.com:1521/g77d27f972ad384_sollitedb_tp.adb.oraclecloud.com
    username: ADMIN
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: true

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── MongoDB ──
  data:
    mongodb:
      uri: mongodb+srv://ADMIN:${MONGO_PASSWORD}@sqllitecluster.fdieckp.mongodb.net/sollite?retryWrites=true&w=majority
    redis:
      host: redis-14247.c340.ap-northeast-2-1.ec2.cloud.redislabs.com
      port: 14247
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  # ── Jackson ──
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss

server:
  port: 8080

# ── SpringDoc ──
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ── Logging ──
logging:
  level:
    com.sollite: DEBUG
    org.hibernate.SQL: DEBUG
