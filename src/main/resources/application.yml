spring:
  application:
    name: sol-lite-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ── Oracle (JPA) ──
  datasource:
    url: jdbc:oracle:thin:@tcps://adb.ap-chuncheon-1.oraclecloud.com:1521/g77d27f972ad384_sollitedb_tp.adb.oraclecloud.com
    username: ADMIN
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 12
      minimum-idle: 4
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.OracleDialect
      format_sql: true
    show-sql: false

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    repair-on-migrate: true

  # ── MongoDB ──
  data:
    mongodb:
      uri: mongodb+srv://ADMIN:${MONGO_PASSWORD}@sqllitecluster.fdieckp.mongodb.net/sollite?retryWrites=true&w=majority
    redis:
      host: redis-15024.c340.ap-northeast-2-1.ec2.cloud.redislabs.com
      port: 15024
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  # ── Mail ──
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Jackson ──
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss

server:
  port: 8080

# ── SpringDoc ──
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    custom-js-url: /swagger-custom.js
  api-docs:
    path: /v3/api-docs

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256BitsLong!!}
  access-token-expiry: 7200000         # 2시간
  refresh-token-expiry: 604800000      # 7일
  auto-login-token-expiry: 2592000000  # 30일

# ── Application URLs ──
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
  mail:
    from: ${MAIL_FROM}
  market:
    backfill:
      daily:
        enabled: false
        start-date: 2026-01-01
        end-date:
      minute:
        enabled: false
        lookback-trading-days: 3
        end-date:
        request-delay-ms: 300
        target-delay-ms: 1000
        rate-limit-retry-delay-ms: 5000
        rate-limit-max-retries: 5
  balance:
    snapshot:
      enabled: true
      cron: "0 0 7 * * MON-FRI"
      bootstrap-on-startup: false

# ── Logging ──
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} : %msg%n"
  level:
    root: INFO
    com.sollite: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.web: INFO
    org.springframework.security: INFO
    reactor.netty: WARN


# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: never

# ── Korea Investment Securities API ──
kis:
  api:
    url: "https://openapi.koreainvestment.com:9443"
    appkey: ${KIS_APPKEY}
    appsecret: ${KIS_APPSECRET}

# ── LS Securities API  & Websocket ──
ls:
  api:
    url: "https://openapi.ls-sec.co.kr:8080"
    appkey: ${LS_APPKEY}
    appsecret: ${LS_APPSECRET}
    mac-address: ${LS_MAC_ADDRESS:}
  ws:
    url: wss://openapi.ls-sec.co.kr:9443/websocket
---
spring:
  config:
    activate:
      on-profile: foreign-debug

logging:
  level:
    com.sollite.foreignmarket: DEBUG
    com.sollite.websocket: DEBUG
    com.sollite.global.service.LsTokenService: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: DEBUG
    reactor.netty: INFO
    reactor.netty.http.client: WARN
