version: 0.0
os: linux
files:
  - source: /
    destination: /opt/spring/app
    overwrite: yes
permissions:
  - object: /opt/spring/app
    owner: ec2-user
    group: ec2-user
hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/start.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root
